    import React, { useState, useEffect } from 'react';

    // =========================================================================
    // Image Compression Helper
    // =========================================================================
    const compressImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1000;
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (e) => reject(e);
        };
        reader.onerror = (e) => reject(e);
      });
    };

    // =========================================================================
    // Mobile Upload Component (QR Target)
    // =========================================================================
    const MobileUploadView = ({ transferId }) => {
      const [status, setStatus] = useState('idle');
      const [mobileUser, setMobileUser] = useState(null);

      useEffect(() => {
        signInAnonymously(auth).then(res => setMobileUser(res.user)).catch(console.error);
      }, []);

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file || !mobileUser) return;

        setStatus('uploading');
        try {
          const base64Data = await compressImage(file);
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transfers', transferId), {
            imageData: base64Data,
            timestamp: Date.now()
          });
          setStatus('success');
        } catch(err) {
          console.error(err);
          setStatus('error');
        }
      };

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-white">
          <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border border-slate-700">
            <Landmark className="w-12 h-12 text-amber-500 mx-auto mb-4" />
            <h1 className="text-2xl font-bold mb-2">อัปโหลดหลักฐาน</h1>
            <p className="text-slate-400 mb-8 text-sm">ถ่ายรูปใบเสร็จเพื่อส่งไปยังหน้าจอคอมพิวเตอร์ของคุณ</p>

            {status === 'idle' && (
              <label className="bg-blue-600 hover:bg-blue-700 transition flex flex-col items-center justify-center gap-3 py-6 rounded-2xl cursor-pointer text-white font-bold shadow-lg">
                <Camera className="w-10 h-10" />
                <span>เปิดกล้อง / เลือกรูปภาพ</span>
                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFileChange} />
              </label>
            )}
            
            {status === 'uploading' && (
              <div className="flex flex-col items-center py-6 text-blue-400">
                <Loader2 className="w-12 h-12 animate-spin mb-4" />
                <span className="font-bold animate-pulse">กำลังประมวลผลและส่งภาพ...</span>
              </div>
            )}
            
            {status === 'success' && (
              <div className="flex flex-col items-center py-6 text-emerald-400 animate-in zoom-in">
                <CheckCircle2 className="w-16 h-16 mb-4" />
                <span className="font-bold text-xl mb-2">ส่งรูปภาพสำเร็จ!</span>
                <button onClick={() => setStatus('idle')} className="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition">
                  ถ่ายรูปเพิ่มอีก
                </button>
                <span className="text-sm text-slate-400 mt-4">หากส่งครบแล้ว สามารถปิดหน้านี้ได้เลย</span>
              </div>
            )}
            
            {status === 'error' && (
              <div className="flex flex-col items-center py-6 text-rose-400">
                <AlertCircle className="w-12 h-12 mb-4" />
                <span className="font-bold">เกิดข้อผิดพลาดในการส่งรูป</span>
                <button onClick={() => setStatus('idle')} className="mt-4 px-6 py-2 bg-slate-700 rounded-lg text-white text-sm">ลองใหม่อีกครั้ง</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // =========================================================================
    // Main Application Component
    // =========================================================================
    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const transferIdParam = urlParams.get('transfer');

      if (transferIdParam) return <MobileUploadView transferId={transferIdParam} />;

      // ---------------------------------------------------------
      // Application States
      // ---------------------------------------------------------
      const [activeTab, setActiveTab] = useState('dashboard');
      const [notifications, setNotifications] = useState('');
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);

      // Print & View Modals
      const [showPrintPreview, setShowPrintPreview] = useState(false); 
      const [showLedgerPrint, setShowLedgerPrint] = useState(false); 
      const [showInventoryPrint, setShowInventoryPrint] = useState(false); 
      const [printTx, setPrintTx] = useState(null); // สำหรับพิมพ์เอกสารขอเบิก/ใบสำคัญรายตัว
      const [previewImage, setPreviewImage] = useState(null); 
      const [viewingTx, setViewingTx] = useState(null); 
      const [qrModalVisible, setQrModalVisible] = useState(false);
      
      // Edit Modals
      const [editingTx, setEditingTx] = useState(null); 
      const [editingItem, setEditingItem] = useState(null); 

      // Configs & Context
      const [dashboardPeriod, setDashboardPeriod] = useState('all'); 
      const [qrContext, setQrContext] = useState('');
      const [activeTransferId, setActiveTransferId] = useState(null);

      const getTodayString = () => {
        const tzoffset = (new Date()).getTimezoneOffset() * 60000;
        return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
      };
      const [reportDate, setReportDate] = useState(getTodayString());

      // Data States
      const [inventory, setInventory] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [incomeCategories, setIncomeCategories] = useState([]);
      const [expenseCategories, setExpenseCategories] = useState([]);
      const [generalSettings, setGeneralSettings] = useState({ templeName: 'วัดไชยามาตย์ จังหวัดแพร่' });

      // Form States
      const [donationForm, setDonationForm] = useState({ title: '', purpose: '', amount: '', detailsUrl: '' });
      const [expenseForm, setExpenseForm] = useState({ title: '', category: '', amount: '', payee: '', detailsUrl: '', isPending: false });
      const [countForm, setCountForm] = useState({ itemId: '', actualRemaining: '' });
      const [newItemForm, setNewItemForm] = useState({ name: '', category: 'พระเครื่อง', price: '', stock: '', cost: '' });
      const [newIncomeCat, setNewIncomeCat] = useState('');
      const [newExpenseCat, setNewExpenseCat] = useState('');
      const [txEditForm, setTxEditForm] = useState({ title: '', category: '', amount: '', date: '', detailsUrl: '' });
      const [editForm, setEditForm] = useState({ name: '', price: '', stockAdjustType: 'none', stockAdjustValue: '', reason: '' });
      
      // State ฟอร์มสร้างใบเบิกเงิน (หลายรายการ)
      const [advanceForm, setAdvanceForm] = useState({ requester: '', objective: '', category: '', items: [{ name: '', qty: 1, price: '' }] });

      // ---------------------------------------------------------
      // Firebase Initialization & Sync
      // ---------------------------------------------------------
      useEffect(() => {
        signInAnonymously(auth).catch(console.error);
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        setLoading(true);

        const inventoryRef = collection(db, 'artifacts', erpAppId, 'public', 'data', 'inventory');
        const unsubInventory = onSnapshot(inventoryRef, (snapshot) => {
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          setInventory(items);
        }, console.error);

        const transactionsRef = collection(db, 'artifacts', erpAppId, 'public', 'data', 'transactions');
        const unsubTransactions = onSnapshot(transactionsRef, (snapshot) => {
          const txs = [];
          snapshot.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
          txs.sort((a, b) => new Date(b.date) - new Date(a.date));
          setTransactions(txs);
          setLoading(false);
        }, console.error);

        const settingsRef = collection(db, 'artifacts', erpAppId, 'public', 'data', 'settings');
        const unsubSettings = onSnapshot(settingsRef, (snapshot) => {
          let foundCats = false;
          let foundGeneral = false;
          snapshot.forEach(docSnap => {
            if (docSnap.id === 'categories') {
              foundCats = true;
              const data = docSnap.data();
              if (data.income) setIncomeCategories(data.income);
              if (data.expense) setExpenseCategories(data.expense);
            }
            if (docSnap.id === 'general') {
              foundGeneral = true;
              const data = docSnap.data();
              setGeneralSettings(prev => ({ ...prev, ...data }));
            }
          });

          if (!foundCats) {
            setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'categories'), {
              income: ['บำรุงทั่วไป', 'กองทุนการศึกษา', 'สร้างถาวรวัตถุ', 'โรงทาน/ช่วยเหลือ'],
              expense: ['ค่าใช้จ่ายสำนักงาน', 'ค่าสาธารณูปโภค', 'ค่าจ้าง/ค่าตอบแทน', 'ค่าบำรุงรักษา', 'จัดงาน/พิธีกรรม']
            });
          }
          if (!foundGeneral) {
            setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'general'), {
              templeName: 'วัดไชยามาตย์ จังหวัดแพร่',
            });
          }
        }, console.error);

        return () => {
          unsubInventory();
          unsubTransactions();
          unsubSettings();
        };
      }, [user]);

      // ตั้งค่าเริ่มต้นของฟอร์มเมื่อโหลดข้อมูลเสร็จ
      useEffect(() => {
        if (incomeCategories.length > 0 && !donationForm.purpose) setDonationForm(prev => ({ ...prev, purpose: incomeCategories[0] }));
      }, [incomeCategories, donationForm.purpose]);

      useEffect(() => {
        if (expenseCategories.length > 0 && !expenseForm.category) setExpenseForm(prev => ({ ...prev, category: expenseCategories[0] }));
        if (expenseCategories.length > 0 && !advanceForm.category) setAdvanceForm(prev => ({ ...prev, category: expenseCategories[0] }));
      }, [expenseCategories, expenseForm.category, advanceForm.category]);

      // ระบบฟังการโอนรูปภาพจากมือถือ
      useEffect(() => {
        if (!activeTransferId || !user) return;
        const transferRef = doc(db, 'artifacts', erpAppId, 'public', 'data', 'transfers', activeTransferId);
        
        const unsub = onSnapshot(transferRef, (snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.data();
            if (data.imageData) {
              const appendUrl = (prevUrl) => prevUrl ? prevUrl + ',' + data.imageData : data.imageData;

              if (qrContext === 'donation') setDonationForm(prev => ({ ...prev, detailsUrl: appendUrl(prev.detailsUrl) }));
              else if (qrContext === 'expense') setExpenseForm(prev => ({ ...prev, detailsUrl: appendUrl(prev.detailsUrl) }));
              else if (qrContext === 'txEdit') setTxEditForm(prev => ({ ...prev, detailsUrl: appendUrl(prev.detailsUrl) }));
              
              showToast('รับรูปภาพจากมือถือสำเร็จ');
              deleteDoc(transferRef).catch(console.error);
            }
          }
        });
        return () => unsub();
      }, [activeTransferId, qrContext, user]);

      // ---------------------------------------------------------
      // Helpers
      // ---------------------------------------------------------
      const showToast = (msg) => {
        setNotifications(msg);
        setTimeout(() => setNotifications(''), 3000);
      };

      const generateRef = (prefix) => {
        const date = new Date();
        const dStr = `${date.getFullYear().toString().substr(-2)}${String(date.getMonth()+1).padStart(2,'0')}`;
        const randomNum = Math.floor(1000 + Math.random() * 9000);
        return `${prefix}-${dStr}-${randomNum}`;
      };

      const getFormatDate = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      };

      const formatMoney = (amount) => {
        return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(amount);
      };

      const openQrSync = (context) => {
        const newSessionId = `transfer-${Date.now()}-${Math.floor(Math.random()*10000)}`;
        setActiveTransferId(newSessionId);
        setQrContext(context);
        setQrModalVisible(true);
      };

      // ---------------------------------------------------------
      // Calculations & Variables
      // ---------------------------------------------------------
      const validTransactions = transactions.filter(t => t.status === 'APPROVED' || !t.status);
      const pendingTransactions = transactions.filter(t => t.status === 'PENDING');
      
      const totalIncome = validTransactions.filter(t => t.type === 'INCOME').reduce((acc, curr) => acc + curr.amount, 0);
      const totalExpense = validTransactions.filter(t => t.type === 'EXPENSE').reduce((acc, curr) => acc + curr.amount, 0);
      const netBalance = totalIncome - totalExpense;
      
      const lowStockItems = inventory.filter(i => i.stock <= 10);
      const selectedItemForCount = inventory.find(i => i.id === countForm.itemId);
      const simulatedSoldQty = countForm.actualRemaining !== '' 
        ? (selectedItemForCount?.stock - parseInt(countForm.actualRemaining)) : null;

      // ---------------------------------------------------------
      // Dashboard Intelligent Data & Charts
      // ---------------------------------------------------------
      const getDashboardTransactions = () => {
        const now = new Date();
        const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        
        let lastMonthDate = new Date();
        lastMonthDate.setMonth(lastMonthDate.getMonth() - 1);
        const lastMonth = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth() + 1).padStart(2, '0')}`;

        if (dashboardPeriod === 'currentMonth') return validTransactions.filter(t => t.date.startsWith(currentMonth));
        else if (dashboardPeriod === 'lastMonth') return validTransactions.filter(t => t.date.startsWith(lastMonth));
        return validTransactions; 
      };

      const dashTx = getDashboardTransactions();
      const dashIncome = dashTx.filter(t => t.type === 'INCOME').reduce((a, c) => a + c.amount, 0);
      const dashExpense = dashTx.filter(t => t.type === 'EXPENSE').reduce((a, c) => a + c.amount, 0);
      const dashNet = dashIncome - dashExpense;

      const trendDataMap = {}; const expCatMap = {}; const incCatMap = {};
      dashTx.forEach(tx => {
        const dateKey = tx.date.split(' ')[0];
        if(!trendDataMap[dateKey]) trendDataMap[dateKey] = { date: dateKey, 'รายรับ': 0, 'รายจ่าย': 0 };
        if(tx.type === 'INCOME') trendDataMap[dateKey]['รายรับ'] += tx.amount;
        if(tx.type === 'EXPENSE') trendDataMap[dateKey]['รายจ่าย'] += tx.amount;

        if(tx.type === 'EXPENSE') {
          if(!expCatMap[tx.category]) expCatMap[tx.category] = 0;
          expCatMap[tx.category] += tx.amount;
        }
        if(tx.type === 'INCOME') {
          if(!incCatMap[tx.category]) incCatMap[tx.category] = 0;
          incCatMap[tx.category] += tx.amount;
        }
      });

      const trendData = Object.values(trendDataMap).sort((a,b) => a.date.localeCompare(b.date));
      const expensePieData = Object.keys(expCatMap).map(k => ({ name: k, value: expCatMap[k] }));
      const incomePieData = Object.keys(incCatMap).map(k => ({ name: k, value: incCatMap[k] }));
      const CHART_COLORS = ['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#6366f1', '#ec4899'];

      const generateInsights = () => {
        if (dashTx.length === 0) return ["ยังไม่มีข้อมูลธุรกรรมในช่วงเวลาที่เลือก"];
        const insights = [];
        if (dashIncome > 0) {
           const percentSaved = ((dashNet / dashIncome) * 100).toFixed(1);
           if (dashNet > 0) insights.push(`สถานภาพคล่อง: มีเงินคงเหลือ ${percentSaved}% ของรายรับรวม ถือว่าอยู่ในเกณฑ์ที่ดีมาก`);
           else insights.push(`⚠️ แจ้งเตือน: สภาพคล่องติดลบ (รายจ่ายสูงกว่ารายรับ) ควรพิจารณาควบคุมการเบิกจ่าย`);
        } else if (dashExpense > 0) {
           insights.push(`⚠️ แจ้งเตือน: ในช่วงเวลานี้มีแต่รายจ่ายโดยไม่มีรายรับเข้ามาในระบบ`);
        }
        if (expensePieData.length > 0) {
           const topExp = [...expensePieData].sort((a,b) => b.value - a.value)[0];
           insights.push(`การใช้จ่าย: หมวดหมู่ที่ใช้จ่ายมากที่สุดคือ "${topExp.name}" คิดเป็น ${((topExp.value / dashExpense) * 100).toFixed(1)}% ของรายจ่ายทั้งหมด`);
        }
        if (incomePieData.length > 0) {
           const topInc = [...incomePieData].sort((a,b) => b.value - a.value)[0];
           insights.push(`รายได้หลัก: มาจากหมวดหมู่ "${topInc.name}" คิดเป็น ${((topInc.value / dashIncome) * 100).toFixed(1)}% ของรายได้ทั้งหมด`);
        }
        return insights;
      };

      // ---------------------------------------------------------
      // Export Data Handlers
      // ---------------------------------------------------------
      const exportCSV = () => {
        const headers = ['วัน/เวลา', 'เลขที่เอกสาร', 'คำอธิบายรายการ', 'หมวดหมู่', 'ประเภท', 'จำนวนเงิน(บาท)'];
        const rows = validTransactions.map(tx => [
          tx.date, tx.id, `"${tx.title.replace(/"/g, '""')}"`, `"${tx.category}"`,
          tx.type === 'INCOME' ? 'รายรับ' : 'รายจ่าย', tx.amount
        ]);
        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `ledger_${getTodayString()}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const exportXLS = () => {
        const tableHtml = `
          <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="utf-8"></head>
            <body>
              <h2>สมุดรายวันทั่วไป - ${generalSettings.templeName}</h2>
              <table border="1">
                <thead><tr><th>วัน/เวลา</th><th>เลขที่เอกสาร</th><th>คำอธิบายรายการ</th><th>หมวดหมู่</th><th>รายรับ (บาท)</th><th>รายจ่าย (บาท)</th></tr></thead>
                <tbody>
                  ${validTransactions.map(tx => `
                    <tr>
                      <td>${tx.date}</td><td>${tx.id}</td><td>${tx.title}</td><td>${tx.category}</td>
                      <td>${tx.type === 'INCOME' ? tx.amount : ''}</td><td>${tx.type === 'EXPENSE' ? tx.amount : ''}</td>
                    </tr>
                  `).join('')}
                  <tr><td colspan="4"><b>รวมยอดสะสมทั้งหมด</b></td><td><b>${totalIncome}</b></td><td><b>${totalExpense}</b></td></tr>
                </tbody>
              </table>
            </body>
          </html>
        `;
        const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `ledger_${getTodayString()}.xls`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      // ---------------------------------------------------------
      // Advance Request (ใบขอเบิกหลายรายการ) Handlers
      // ---------------------------------------------------------
      const advanceTotal = advanceForm.items.reduce((acc, item) => acc + ((parseInt(item.qty) || 0) * (parseFloat(item.price) || 0)), 0);

      const handleAddAdvanceItem = () => {
        setAdvanceForm({ ...advanceForm, items: [...advanceForm.items, { name: '', qty: 1, price: '' }] });
      };

      const handleRemoveAdvanceItem = (index) => {
        const newItems = [...advanceForm.items];
        newItems.splice(index, 1);
        setAdvanceForm({ ...advanceForm, items: newItems });
      };

      const handleAdvanceItemChange = (index, field, value) => {
        const newItems = [...advanceForm.items];
        newItems[index][field] = value;
        setAdvanceForm({ ...advanceForm, items: newItems });
      };

      const handleAdvanceSubmit = async (e) => {
        e.preventDefault();
        if (advanceForm.items.length === 0 || advanceTotal <= 0) return alert('กรุณาเพิ่มรายการและระบุราคาให้ถูกต้อง');
        if (!user) return;
        
        const newTx = {
          id: generateRef('REQ'), 
          date: getFormatDate(), 
          type: 'EXPENSE', 
          category: advanceForm.category || expenseCategories[0] || 'เบิกจ่ายทั่วไป', 
          title: advanceForm.objective, 
          amount: advanceTotal, 
          refId: generateRef('ADV'), 
          detailsUrl: '', 
          status: 'PENDING', 
          requester: advanceForm.requester,
          subItems: advanceForm.items
        };

        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
        
        // ล้างฟอร์ม โชว์แจ้งเตือน เด้งหน้าพิมพ์ และพากลับไปหน้า Approvals
        setAdvanceForm({ requester: '', objective: '', category: expenseCategories[0] || '', items: [{ name: '', qty: 1, price: '' }] });
        showToast('สร้างใบขอเบิกเงินเรียบร้อยแล้ว');
        setPrintTx(newTx); 
        setActiveTab('approvals');
      };

      // ---------------------------------------------------------
      // Database Submit Handlers
      // ---------------------------------------------------------
      const handleDonationSubmit = async (e) => {
        e.preventDefault();
        if (!donationForm.amount || !donationForm.title || !user) return;
        
        const newTx = {
          id: generateRef('TX'), date: getFormatDate(), type: 'INCOME', category: 'รายรับรวบยอด', 
          title: `${donationForm.title} (${donationForm.purpose})`, amount: parseFloat(donationForm.amount), 
          refId: generateRef('REC'), detailsUrl: donationForm.detailsUrl, status: 'APPROVED'
        };
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
        setDonationForm({ title: '', purpose: incomeCategories[0] || '', amount: '', detailsUrl: '' });
        showToast('บันทึกยอดรวมสำเร็จ');
      };

      const handleExpenseSubmit = async (e) => {
        e.preventDefault();
        if (!expenseForm.amount || !expenseForm.title || !user) return;
        
        const reqStatus = expenseForm.isPending ? 'PENDING' : 'APPROVED';
        const prefix = expenseForm.isPending ? 'REQ' : 'EXP';
        const newTx = {
          id: generateRef('TX'), date: getFormatDate(), type: 'EXPENSE', category: expenseForm.category, 
          title: `${expenseForm.title} (ผู้รับ: ${expenseForm.payee || 'ไม่ระบุ'})`, amount: parseFloat(expenseForm.amount), 
          refId: generateRef(prefix), detailsUrl: expenseForm.detailsUrl, status: reqStatus, requester: 'เจ้าหน้าที่บัญชี (ผ่านระบบ)'
        };
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
        setExpenseForm({ title: '', category: expenseCategories[0] || '', amount: '', payee: '', detailsUrl: '', isPending: false });
        showToast(reqStatus === 'PENDING' ? 'สร้างคำขอเบิกเงิน (รออนุมัติ) เรียบร้อย' : 'บันทึกรายจ่ายตัดยอดทันทีเรียบร้อย');
      };
      
      const handleDeleteTransaction = async (txId) => {
        if (!user) return;
        if (!window.confirm('ยืนยันการลบรายการบัญชีนี้? (การกระทำนี้ไม่สามารถย้อนกลับได้)')) return;
        try {
          await deleteDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', txId));
          showToast('ลบรายการบัญชีเรียบร้อย');
        } catch(err) { console.error(err); alert('เกิดข้อผิดพลาดในการลบรายการ'); }
      };

      const handleEditTxClick = (tx) => {
        const pass = prompt('กรุณากรอกรหัสผ่าน (Passcode) เพื่อสิทธิ์ในการแก้ไขข้อมูลบัญชี:');
        if (pass === '65411597') {
           setEditingTx(tx);
           setTxEditForm({
             title: tx.title,
             category: tx.category,
             amount: tx.amount,
             date: tx.date,
             detailsUrl: tx.detailsUrl || ''
           });
        } else if (pass !== null) {
           alert('❌ รหัสผ่านไม่ถูกต้อง ไม่อนุญาตให้แก้ไขข้อมูลบัญชี');
        }
      };

      const handleSaveTxEdit = async (e) => {
        e.preventDefault();
        if(!editingTx || !user) return;
        try {
          const updatedTx = {
            ...editingTx,
            title: txEditForm.title,
            category: txEditForm.category,
            amount: parseFloat(txEditForm.amount),
            date: txEditForm.date,
            detailsUrl: txEditForm.detailsUrl
          };
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', editingTx.id), updatedTx);
          setEditingTx(null);
          if (viewingTx && viewingTx.id === editingTx.id) setViewingTx(updatedTx);
          showToast('บันทึกการแก้ไขรายการบัญชีเรียบร้อย');
        } catch(err) {
          console.error(err); alert('เกิดข้อผิดพลาดในการบันทึกแก้ไข');
        }
      };

      const handleApproveRequest = async (txId) => {
        if (!user) return;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', txId), { status: 'APPROVED' }, { merge: true });
        showToast('อนุมัติรายการเบิกจ่ายเรียบร้อย');
      };

      const handleRejectRequest = async (txId) => {
        if (!user) return;
        if (!window.confirm('ยืนยันการ "ปฏิเสธ" คำขอเบิกจ่ายนี้?')) return;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', txId), { status: 'REJECTED' }, { merge: true });
        showToast('ปฏิเสธรายการเรียบร้อย');
      };

      const handleStockCountSubmit = async (e) => {
        e.preventDefault();
        if(!user) return;
        const item = inventory.find(i => i.id === countForm.itemId);
        const actualRemaining = parseInt(countForm.actualRemaining);
        if (!item || isNaN(actualRemaining) || actualRemaining < 0) return alert('กรุณาระบุจำนวนยอดคงเหลือให้ถูกต้อง');
        if (actualRemaining > item.stock) return alert(`ยอดคงเหลือที่ระบุ มากกว่าสต๊อกที่มีในระบบ`);

        const soldQty = item.stock - actualRemaining;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', item.id), { stock: actualRemaining }, { merge: true });

        if (soldQty > 0) {
          const newTx = {
            id: generateRef('TX'), date: getFormatDate(), type: 'INCOME', category: 'เช่าบูชา', 
            title: `รายรับจากการเช่าบูชา ${item.name} (จำหน่ายออก ${soldQty} ชิ้น)`, amount: item.price * soldQty, refId: item.id, status: 'APPROVED'
          };
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
          showToast(`บันทึกการจำหน่าย ${soldQty} ชิ้น และอัปเดตสต๊อกเรียบร้อย`);
        } else {
          showToast(`อัปเดตยอดคงเหลือเรียบร้อย`);
        }
        setCountForm({ itemId: '', actualRemaining: '' });
      };

      const handleAddInventory = async (e) => {
        e.preventDefault();
        if (!newItemForm.name || !newItemForm.price || !user) return;
        const newItem = {
          id: generateRef('INV'), name: newItemForm.name, category: newItemForm.category, price: parseFloat(newItemForm.price),
          cost: parseFloat(newItemForm.cost || 0), stock: parseInt(newItemForm.stock || 0)
        };
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', newItem.id), newItem);
        setNewItemForm({ name: '', category: 'พระเครื่อง', price: '', stock: '', cost: '' });
        showToast('เพิ่มรายการวัตถุมงคลเข้าคลังเรียบร้อย');
      };

      const handleDeleteInventory = async (itemId, itemName) => {
        if (!user) return;
        if (!window.confirm(`ยืนยันการลบ "${itemName}" ออกจากคลังสินค้า? (การกระทำนี้ไม่สามารถย้อนกลับได้)`)) return;
        try {
          await deleteDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', itemId));
          showToast('ลบรายการสินค้าเรียบร้อย');
        } catch(err) { console.error(err); alert('เกิดข้อผิดพลาดในการลบรายการ'); }
      };

      const handleSaveGeneralSettings = async (e) => {
        e.preventDefault();
        if (!user) return;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'general'), generalSettings, { merge: true });
        showToast('บันทึกการตั้งค่าระบบเรียบร้อย');
      };

      const handleAddCategory = async (type, e) => {
        e.preventDefault();
        if (!user) return;
        const value = type === 'income' ? newIncomeCat.trim() : newExpenseCat.trim();
        if (!value) return;
        const currentList = type === 'income' ? incomeCategories : expenseCategories;
        if (currentList.includes(value)) return alert('หมวดหมู่นี้มีอยู่ในระบบแล้ว');
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'categories'), { [type]: [...currentList, value] }, { merge: true });
        if (type === 'income') setNewIncomeCat('');
        if (type === 'expense') setNewExpenseCat('');
      };

      const handleDeleteCategory = async (type, valueToDelete) => {
        if (!user || !window.confirm(`ยืนยันการลบหมวดหมู่ "${valueToDelete}" ?`)) return;
        const currentList = type === 'income' ? incomeCategories : expenseCategories;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'categories'), { [type]: currentList.filter(cat => cat !== valueToDelete) }, { merge: true });
      };

      const openEditModal = (item) => {
        setEditingItem(item);
        setEditForm({ name: item.name, price: item.price, stockAdjustType: 'none', stockAdjustValue: '', reason: '' });
      };

      const handleSaveInventoryEdit = async (e) => {
        e.preventDefault();
        if (!editingItem || !user) return;

        try {
          let newStock = editingItem.stock;
          const adjustVal = parseInt(editForm.stockAdjustValue) || 0;

          if (editForm.stockAdjustType === 'add') newStock += adjustVal;
          else if (editForm.stockAdjustType === 'reduce') newStock = Math.max(0, newStock - adjustVal);

          const updatedItem = { ...editingItem, name: editForm.name, price: parseFloat(editForm.price), stock: newStock };
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', editingItem.id), updatedItem);

          if (editForm.stockAdjustType !== 'none' && adjustVal > 0) {
            const actionStr = editForm.stockAdjustType === 'add' ? 'เติมสต๊อก' : 'สูญหาย/ชำรุด';
            const newTx = {
              id: generateRef('TX'), date: getFormatDate(), type: 'INCOME', category: 'ปรับปรุงสต๊อก',
              title: `[${actionStr}] ${editForm.name} ปรับจำนวน ${adjustVal} ชิ้น ${editForm.reason ? `(เหตุผล: ${editForm.reason})` : ''}`,
              amount: 0, refId: editingItem.id, detailsUrl: '', status: 'APPROVED'
            };
            await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
          }
          setEditingItem(null);
          showToast('บันทึกการแก้ไขรายการเรียบร้อย');
        } catch (err) {
          console.error("Save Edit Error:", err);
          alert("เกิดข้อผิดพลาดในการอัปเดตข้อมูลสต๊อก กรุณาลองใหม่อีกครั้ง");
        }
      };

      // ---------------------------------------------------------
      // Component: Multi-Image Upload Field
      // ---------------------------------------------------------
      const renderImageUploadField = (formState, setFormState, contextId) => {
        const urls = formState.detailsUrl ? formState.detailsUrl.split(',').filter(Boolean) : [];
        
        const removeImage = (indexToRemove) => {
          const newUrls = urls.filter((_, idx) => idx !== indexToRemove);
          setFormState({ ...formState, detailsUrl: newUrls.join(',') });
        };

        const handleAddManualUrl = () => {
          const url = prompt('วางลิงก์รูปภาพหรือไฟล์เอกสาร (URL):');
          if(url && url.trim() !== '') {
            setFormState({...formState, detailsUrl: formState.detailsUrl ? formState.detailsUrl + ',' + url.trim() : url.trim()});
          }
        };

        return (
          <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
            <label className="block text-sm font-bold text-slate-800 mb-4 flex justify-between items-center">
              <span>📸 รูปภาพหลักฐาน / ใบเสร็จรับเงิน</span>
              <span className="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-full font-medium">{urls.length} ไฟล์แนบ</span>
            </label>
            
            {urls.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                {urls.map((url, idx) => (
                  <div key={idx} className="relative group rounded-xl overflow-hidden border border-slate-200 bg-white aspect-square flex items-center justify-center">
                    {url.startsWith('data:image') || url.match(/\.(jpeg|jpg|gif|png)$/) != null ? (
                      <img src={url} alt={`Evidence ${idx+1}`} className="w-full h-full object-cover" />
                    ) : (
                      <div className="flex flex-col items-center text-slate-400 p-2 text-center">
                        <Link className="w-8 h-8 mb-1"/>
                        <span className="text-xs truncate w-full px-1">{url}</span>
                      </div>
                    )}
                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                      <button type="button" onClick={() => removeImage(idx)} className="text-white bg-rose-600 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-rose-700 shadow-md flex items-center gap-1">
                        <Trash2 className="w-4 h-4"/> ลบ
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            
            <div className="flex flex-col sm:flex-row gap-3 items-center">
              <button type="button" onClick={() => openQrSync(contextId)} className="w-full sm:flex-1 bg-blue-600 text-white hover:bg-blue-700 py-3.5 rounded-xl transition flex items-center justify-center gap-2 font-bold shadow-md">
                <Camera className="w-5 h-5"/> สแกนมือถือถ่ายรูปเพิ่ม
              </button>
              <button type="button" onClick={handleAddManualUrl} className="w-full sm:flex-1 bg-white border border-blue-200 text-blue-700 hover:bg-blue-50 py-3.5 rounded-xl transition flex items-center justify-center gap-2 font-bold shadow-sm">
                <Link className="w-5 h-5"/> วางลิงก์รูปภาพ (URL)
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-3 text-center">สามารถสแกนถ่ายรูปจากมือถือได้หลายรูป ระบบจะนำมาเรียงต่อกันให้อัตโนมัติ</p>
          </div>
        );
      };

      // =========================================================================
      // Loading View
      // =========================================================================
      if (loading) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-100">
            <div className="flex flex-col items-center gap-4">
              <Loader2 className="w-8 h-8 text-blue-600 animate-spin" />
              <p className="text-slate-600 font-medium">กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
          </div>
        );
      }

      // =========================================================================
      // Main App Layout
      // =========================================================================
      return (
        <div className="flex h-screen bg-slate-100 overflow-hidden print:h-auto print:overflow-visible">
          
          {/* ---------------- Sidebar Navigation (Desktop) ---------------- */}
          <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-20 hidden md:flex print:hidden shrink-0">
            <div className="p-6 flex items-center gap-3 text-white border-b border-slate-800">
              <Landmark className="w-8 h-8 text-amber-500 shrink-0" />
              <div className="overflow-hidden">
                <h1 className="font-bold text-lg leading-tight truncate">ระบบบัญชีวัด</h1>
                <p className="text-xs text-slate-400 truncate">{generalSettings.templeName}</p>
              </div>
            </div>
            
            <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
              <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'dashboard' ? 'bg-blue-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <LayoutDashboard className="w-5 h-5" /> ภาพรวม
              </button>
              
              <div className="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">ระบบรายงาน</div>
              <button onClick={() => setActiveTab('approvals')} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition ${activeTab === 'approvals' ? 'bg-amber-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <div className="flex items-center gap-3"><ClipboardList className="w-5 h-5" /> คำขอเบิกเงิน</div>
                {pendingTransactions.length > 0 && <span className="bg-rose-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">{pendingTransactions.length}</span>}
              </button>
              <button onClick={() => setActiveTab('dailyReport')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'dailyReport' ? 'bg-blue-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <CalendarDays className="w-5 h-5" /> พิมพ์รายงานประจำวัน
              </button>
              
              <div className="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">ระบบรายได้ / สินทรัพย์</div>
              <button onClick={() => setActiveTab('donation')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'donation' ? 'bg-emerald-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <HandHeart className="w-5 h-5" /> รายรับรวบยอด
              </button>
              <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'inventory' ? 'bg-indigo-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <PackageSearch className="w-5 h-5" /> เช่าบูชา & นับสต๊อก
              </button>
              
              <div className="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">ระบบรายจ่าย</div>
              
              {/* === เพิ่มเมนูสร้างใบเบิกเงิน === */}
              <button onClick={() => setActiveTab('advance')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'advance' ? 'bg-amber-500 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>
                <FileText className="w-5 h-5" /> ออกใบเบิกเงิน (หลายรายการ)
              </button>

              <button onClick={() => setActiveTab('expense')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'expense' ? 'bg-rose-600 text-white font-medium shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}>

              </div>
              
              <div className="flex-1 overflow-auto p-4 md:p-8 print:p-0 print:overflow-visible print:h-auto print:block">
                <div className="bg-white w-full max-w-[21cm] min-h-[29.7cm] mx-auto p-10 md:p-14 shadow-2xl print:shadow-none print:p-0 text-slate-900 print:max-w-none print:min-h-0 print:w-full print:block">
                  
                  <div className="mb-6">
                    <img src={REPORT_HEADER_IMG} alt="Header" className="w-full object-contain" />
                  </div>

                  <div className="text-center mb-8">
                    <h1 className="text-3xl font-bold mb-3">สมุดรายวันทั่วไป (General Ledger)</h1>
                    <h2 className="text-xl font-bold mb-2">{generalSettings.templeName}</h2>
                    <p className="text-lg font-medium">ข้อมูลธุรกรรมสะสมทั้งหมดถึงปัจจุบัน</p>
                  </div>
                  
                  <table className="w-full text-left text-sm border-collapse border border-black mb-8">
                    <thead className="bg-slate-100 print:bg-transparent">
                      <tr className="border-b border-black">
                        <th className="py-2.5 px-3 font-bold border-r border-black text-center">วัน/เวลา</th>
                        <th className="py-2.5 px-3 font-bold border-r border-black text-center">เลขที่เอกสาร</th>
                        <th className="py-2.5 px-3 font-bold border-r border-black text-center">รายการ</th>
                        <th className="py-2.5 px-3 font-bold border-r border-black text-center">หมวดหมู่</th>
                        <th className="py-2.5 px-3 font-bold border-r border-black text-center">รายรับ</th>
                        <th className="py-2.5 px-3 font-bold text-center">รายจ่าย</th>
                      </tr>
                    </thead>
                    <tbody>
                      {validTransactions.length === 0 ? (
                        <tr>
                          <td colSpan="6" className="py-6 text-center text-slate-500 italic border-b border-black">ไม่มีข้อมูลธุรกรรม</td>
                        </tr>
                      ) : (
                        validTransactions.map(tx => (
                          <tr key={tx.id} className="border-b border-slate-300 print:border-black">
                            <td className="py-2 px-3 text-center border-r border-slate-300 print:border-black">{tx.date}</td>
                            <td className="py-2 px-3 text-center border-r border-slate-300 print:border-black">{tx.id}</td>
                            <td className="py-2 px-3 border-r border-slate-300 print:border-black">{tx.title}</td>
                            <td className="py-2 px-3 border-r border-slate-300 print:border-black text-center">{tx.category}</td>
                            <td className="py-2 px-3 text-right border-r border-slate-300 print:border-black font-medium">{tx.type === 'INCOME' ? formatMoney(tx.amount).replace('฿', '').trim() : '-'}</td>
                            <td className="py-2 px-3 text-right font-medium">{tx.type === 'EXPENSE' ? formatMoney(tx.amount).replace('฿', '').trim() : '-'}</td>
                          </tr>
                        ))
                      )}
                      <tr className="bg-slate-50 print:bg-transparent font-bold border-t-2 border-black">
                        <td colSpan="4" className="py-4 px-3 text-right text-base border-r border-black">รวมยอดยกไปทั้งสิ้น</td>
                        <td className="py-4 px-3 text-right text-base border-r border-black text-emerald-700 print:text-black">{formatMoney(totalIncome).replace('฿', '').trim()}</td>
                        <td className="py-4 px-3 text-right text-base text-rose-700 print:text-black underline decoration-double">{formatMoney(totalExpense).replace('฿', '').trim()}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: View Transaction Details (มีรายการย่อย) ----- */}
          {viewingTx && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                  <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2">
                    <ClipboardList className="w-6 h-6 text-blue-600"/> รายละเอียดธุรกรรม
                  </h3>
                  <button onClick={() => setViewingTx(null)} className="bg-slate-200 hover:bg-slate-300 text-slate-600 rounded-full p-2 transition">
                    <X className="w-5 h-5"/>
                  </button>
                </div>
                
                <div className="p-6 md:p-8 overflow-y-auto">
                  <div className="flex flex-col md:flex-row justify-between items-start gap-4 mb-6">
                    <div>
                      <span className={`text-xs font-bold px-3 py-1 rounded-full mb-3 inline-block ${viewingTx.type === 'INCOME' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                        {viewingTx.type === 'INCOME' ? 'รายรับ' : 'รายจ่าย'}
                      </span>
                      <h2 className="text-2xl font-bold text-slate-800">{viewingTx.title}</h2>
                      <p className="text-slate-500 mt-1">รหัสเอกสาร: <span className="font-mono">{viewingTx.refId || viewingTx.id}</span></p>
                    </div>
                    <div className={`text-3xl font-bold ${viewingTx.type === 'INCOME' ? 'text-emerald-600' : 'text-rose-600'}`}>
                      {formatMoney(viewingTx.amount)}
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-y-6 gap-x-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                    <div><p className="text-sm text-slate-400 font-medium mb-1">วัน/เวลาที่ทำรายการ</p><p className="font-semibold text-slate-800">{viewingTx.date}</p></div>
                    <div><p className="text-sm text-slate-400 font-medium mb-1">หมวดหมู่</p><p className="font-semibold text-slate-800">{viewingTx.category}</p></div>
                    <div><p className="text-sm text-slate-400 font-medium mb-1">ผู้ทำรายการ</p><p className="font-semibold text-slate-800">{viewingTx.requester || 'เจ้าหน้าที่บัญชี'}</p></div>
                    <div><p className="text-sm text-slate-400 font-medium mb-1">สถานะ</p><p className={`font-semibold ${viewingTx.status === 'PENDING' ? 'text-amber-600' : 'text-emerald-600'}`}>{viewingTx.status === 'PENDING' ? 'รออนุมัติ' : 'อนุมัติแล้ว'}</p></div>
                  </div>

                  {/* แสดงรายการย่อย ถ้ามี */}
                  {viewingTx.subItems && viewingTx.subItems.length > 0 && (
                    <div className="mb-8">
                      <h4 className="font-bold text-lg text-slate-800 mb-3 border-b pb-2">รายการที่ขอเบิก</h4>
                      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                        <table className="w-full text-sm text-left">
                          <thead className="bg-slate-50 border-b border-slate-200">
                            <tr>
                              <th className="px-4 py-3 font-semibold">รายการ</th>
                              <th className="px-4 py-3 font-semibold text-center">จำนวน</th>
                              <th className="px-4 py-3 font-semibold text-right">ราคา/หน่วย</th>
                              <th className="px-4 py-3 font-semibold text-right">รวม</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {viewingTx.subItems.map((it, i) => (
                              <tr key={i}>
                                <td className="px-4 py-3">{it.name}</td>
                                <td className="px-4 py-3 text-center">{it.qty}</td>
                                <td className="px-4 py-3 text-right">{formatMoney(it.price)}</td>
                                <td className="px-4 py-3 text-right font-bold text-slate-700">{formatMoney(it.qty * it.price)}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  <div>
                    <h4 className="font-bold text-lg text-slate-800 mb-4 border-b pb-2">รูปภาพหลักฐาน / ใบเสร็จ</h4>
                    {viewingTx.detailsUrl && viewingTx.detailsUrl !== 'ไม่มีใบเสร็จ' ? (
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                        {viewingTx.detailsUrl.split(',').filter(Boolean).map((url, idx) => (
                          <div key={idx} className="relative rounded-xl overflow-hidden border border-slate-200 bg-white aspect-square flex items-center justify-center cursor-pointer hover:shadow-md transition" onClick={() => setPreviewImage(url)}>
                            {url.startsWith('data:image') || url.match(/\.(jpeg|jpg|gif|png)$/) != null ? (
                              <img src={url} alt={`Evidence ${idx}`} className="w-full h-full object-cover" />
                            ) : (
                              <a href={url} target="_blank" rel="noreferrer" className="flex flex-col items-center text-blue-500 hover:text-blue-700 p-4 text-center w-full h-full justify-center bg-blue-50">
                                <ExternalLink className="w-8 h-8 mb-2"/>
                                <span className="text-sm font-medium">เปิดดูไฟล์แนบ</span>
                              </a>
                            )}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="bg-slate-50 border border-dashed border-slate-300 rounded-xl p-8 text-center">
                        <ImageIcon className="w-12 h-12 text-slate-300 mx-auto mb-2"/>
                        <p className="text-slate-500 font-medium">ไม่มีการแนบรูปภาพหรือหลักฐาน</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: Edit Transaction (Ledger Edit) ----- */}
          {editingTx && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
                <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-amber-50 shrink-0">
                  <h3 className="font-bold text-xl text-amber-800 flex items-center gap-2">
                    <Edit2 className="w-6 h-6 text-amber-600"/> แก้ไขข้อมูลบัญชี (ระดับแอดมิน)
                  </h3>
                  <button onClick={() => setEditingTx(null)} className="bg-amber-200 hover:bg-amber-300 text-amber-800 rounded-full p-2 transition">
                    <X className="w-5 h-5"/>
                  </button>
                </div>
                
                <div className="p-6 md:p-8 overflow-y-auto">
                  <form onSubmit={handleSaveTxEdit} className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold mb-2">วัน/เวลา</label>
                        <input required type="text" value={txEditForm.date} onChange={e=>setTxEditForm({...txEditForm, date: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">จำนวนเงิน (บาท)</label>
                        <input required type="number" value={txEditForm.amount} onChange={e=>setTxEditForm({...txEditForm, amount: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-600"/>
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm font-semibold mb-2">รายการ / คำอธิบาย</label>
                      <input required type="text" value={txEditForm.title} onChange={e=>setTxEditForm({...txEditForm, title: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                    </div>
                    
                    <div>
                      <label className="block text-sm font-semibold mb-2">หมวดหมู่</label>
                      <select value={txEditForm.category} onChange={e=>setTxEditForm({...txEditForm, category: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        {(editingTx.type === 'INCOME' ? incomeCategories : expenseCategories).map((cat, idx) => (
                          <option key={idx} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>

                    {renderImageUploadField(txEditForm, setTxEditForm, 'txEdit')}

                    <div className="pt-4 border-t border-slate-100 flex gap-3">
                      <button type="button" onClick={() => setEditingTx(null)} className="flex-1 bg-white border border-slate-300 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">ยกเลิก</button>
                      <button type="submit" className="flex-1 bg-amber-600 text-white py-3 rounded-xl font-bold hover:bg-amber-700 transition flex items-center justify-center gap-2"><Save className="w-5 h-5"/> บันทึกการแก้ไข</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: Edit Inventory Items ----- */}
          {editingItem && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 relative">
                <button onClick={() => setEditingItem(null)} className="absolute top-4 right-4 bg-slate-100 text-slate-500 hover:text-rose-500 rounded-full p-2 transition">
                  <X className="w-5 h-5"/>
                </button>
                <h3 className="font-bold text-xl text-slate-800 mb-6 flex items-center gap-2"><Edit2 className="w-5 h-5 text-blue-500"/> แก้ไขรายการสินค้า</h3>
                <form onSubmit={handleSaveInventoryEdit} className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold mb-1">ชื่อรายการ</label>
                    <input 
                      required 
                      type="text" 
                      value={editForm.name} 
                      onChange={e=>setEditForm({...editForm, name: e.target.value})} 
                      className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold mb-1">ราคาบูชา (บาท)</label>
                    <input 
                      required 
                      type="number" 
                      min="0" 
                      value={editForm.price} 
                      onChange={e=>setEditForm({...editForm, price: e.target.value})} 
                      className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-blue-700 font-bold" 
                    />
                  </div>
                  <div className="border-t border-slate-200 pt-5 mt-2">
                    <label className="block text-sm font-semibold mb-3">ปรับปรุงสต๊อก (ปัจจุบัน: {editingItem.stock} ชิ้น)</label>
                    <div className="flex gap-4 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                      <label className="flex items-center gap-2 text-sm font-medium cursor-pointer">
                        <input type="radio" checked={editForm.stockAdjustType === 'none'} onChange={() => setEditForm({...editForm, stockAdjustType: 'none', stockAdjustValue: '', reason: ''})} className="w-4 h-4"/> 
                        ไม่ปรับ
                      </label>
                      <label className="flex items-center gap-2 text-sm font-medium text-emerald-700 cursor-pointer">
                        <input type="radio" checked={editForm.stockAdjustType === 'add'} onChange={() => setEditForm({...editForm, stockAdjustType: 'add'})} className="w-4 h-4"/> 
                        เติม (+)
                      </label>
                      <label className="flex items-center gap-2 text-sm font-medium text-rose-700 cursor-pointer">
                        <input type="radio" checked={editForm.stockAdjustType === 'reduce'} onChange={() => setEditForm({...editForm, stockAdjustType: 'reduce'})} className="w-4 h-4"/> 
                        หัก (-)
                      </label>
                    </div>
                    {editForm.stockAdjustType !== 'none' && (
                      <div className="space-y-4 animate-in slide-in-from-top-2">
                        <div>
                          <label className="block text-xs font-semibold mb-1">จำนวนชิ้นที่ปรับ</label>
                          <input required type="number" min="1" value={editForm.stockAdjustValue} onChange={e=>setEditForm({...editForm, stockAdjustValue: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-center font-bold text-lg"/>
                        </div>
                        <div>
                          <label className="block text-xs font-semibold mb-1">หมายเหตุ (ถ้ามี)</label>
                          <input type="text" value={editForm.reason} onChange={e=>setEditForm({...editForm, reason: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm" placeholder="เช่น สินค้าชำรุด"/>
                        </div>
                      </div>
                    )}
                  </div>
                  <div className="flex gap-3 pt-4 border-t border-slate-100">
                    <button type="button" onClick={() => setEditingItem(null)} className="flex-1 bg-white border border-slate-300 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">ยกเลิก</button>
                    <button type="submit" className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2"><Save className="w-5 h-5"/> บันทึก</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ----- Modal: QR Scan Camera Component ----- */}
          {qrModalVisible && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-3xl w-full max-w-sm text-center p-8 relative shadow-2xl">
                <button onClick={() => {setQrModalVisible(false); setActiveTransferId(null);}} className="absolute top-4 right-4 bg-slate-100 hover:bg-rose-100 hover:text-rose-600 rounded-full p-2 transition">
                  <X className="w-5 h-5"/>
                </button>
                <div className="mx-auto bg-blue-50 text-blue-600 w-20 h-20 rounded-full flex items-center justify-center mb-6">
                  <Camera className="w-10 h-10"/>
                </div>
                <h3 className="font-bold text-2xl mb-2">สแกนเพื่อถ่ายรูปจากมือถือ</h3>
                <p className="text-sm text-slate-500 mb-8">เปิดกล้องมือถือสแกน QR Code นี้</p>
                <div className="flex justify-center mb-8 bg-white p-4 rounded-xl border-2 border-dashed border-blue-200 inline-block mx-auto">
                  {activeTransferId && <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?transfer=' + activeTransferId)}&margin=0`} alt="QR Code" className="w-56 h-56 rounded-lg" />}
                </div>
                <div className="flex flex-col items-center gap-3 text-blue-600 bg-blue-50 py-4 rounded-xl">
                  <Loader2 className="w-6 h-6 animate-spin" />
                  <p className="text-sm font-bold animate-pulse">กำลังรอรับรูปภาพจากโทรศัพท์...</p>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: Full Image Preview Popup ----- */}
          {previewImage && (
            <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-sm flex items-center justify-center p-4 print:hidden" onClick={() => setPreviewImage(null)}>
              <button onClick={() => setPreviewImage(null)} className="absolute top-6 right-6 text-white hover:text-rose-400 bg-white/20 hover:bg-white/30 rounded-full p-3 transition">
                <X className="w-8 h-8"/>
              </button>
              {previewImage.startsWith('data:image') || previewImage.match(/\.(jpeg|jpg|gif|png)$/) != null ? (
                <img src={previewImage} alt="Evidence" className="max-w-full max-h-full object-contain rounded-xl shadow-2xl" onClick={e => e.stopPropagation()} />
              ) : (
                <div className="bg-white p-8 rounded-2xl flex flex-col items-center" onClick={e => e.stopPropagation()}>
                  <ExternalLink className="w-16 h-16 text-blue-500 mb-4"/>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">นี่คือไฟล์แนบภายนอก</h3>
                  <p className="text-slate-500 mb-6">กรุณากดเปิดเพื่อดูไฟล์ในหน้าต่างใหม่</p>
                  <a href={previewImage} target="_blank" rel="noreferrer" className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700">เปิดดูไฟล์แนบ</a>
                </div>
              )}
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
