    // =========================================================================
    // Image Compression Helper
    // =========================================================================
    const compressImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1000;
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (e) => reject(e);
        };
        reader.onerror = (e) => reject(e);
      });
    };

    // =========================================================================
    // URL Parser & Image Validator Helper
    // =========================================================================
    const parseUrls = (str) => {
        if (!str || str === 'ไม่มีใบเสร็จ') return [];
        if (str.includes('|||')) return str.split('|||').filter(Boolean);
        
        if (str.startsWith('data:image')) {
            const matches = str.match(/data:image/g);
            if (matches && matches.length === 1) return [str]; 
        }
        
        if (str.includes(',') && !str.includes('data:image')) {
             return str.split(',').filter(Boolean);
        }
        
        return [str]; 
    };

    const isImageUrl = (url) => {
        if (!url) return false;
        return url.startsWith('data:image') || 
               url.match(/\.(jpeg|jpg|gif|png|webp|bmp)$/i) != null || 
               url.includes('alt=media');
    };

      const [expenseCategories, setExpenseCategories] = useState([]);

      };

      const formatMoney = (amount) => {
        return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(amount);
      };

      const openQrSync = (context) => {

      const dashTx = getDashboardTransactions();

      const dashNet = dashIncome - dashExpense;

      const trendDataMap = {}; const expCatMap = {}; const incCatMap = {};
      dashTx.forEach(tx => {

        if(!trendDataMap[dateKey]) trendDataMap[dateKey] = { date: dateKey, 'รายรับ': 0, 'รายจ่าย': 0 };

        if(tx.type === 'EXPENSE') trendDataMap[dateKey]['รายจ่าย'] += tx.amount;

        if(tx.type === 'EXPENSE') {

          expCatMap[tx.category] += tx.amount;
        }
        if(tx.type === 'INCOME') {
          if(!incCatMap[tx.category]) incCatMap[tx.category] = 0;
          incCatMap[tx.category] += tx.amount;

      });

      const trendData = Object.values(trendDataMap).sort((a,b) => a.date.localeCompare(b.date));

        if (dashIncome > 0) {
           const percentSaved = ((dashNet / dashIncome) * 100).toFixed(1);
           if (dashNet > 0) insights.push(`สถานภาพคล่อง: มีเงินคงเหลือ ${percentSaved}% ของรายรับรวม ถือว่าอยู่ในเกณฑ์ที่ดีมาก`);
           else insights.push(`⚠️ แจ้งเตือน: สภาพคล่องติดลบ (รายจ่ายสูงกว่ารายรับ) ควรพิจารณาควบคุมการเบิกจ่าย`);
        } else if (dashExpense > 0) {
           insights.push(`⚠️ แจ้งเตือน: ในช่วงเวลานี้มีแต่รายจ่ายโดยไม่มีรายรับเข้ามาในระบบ`);
        }
        if (expensePieData.length > 0) {
           const topExp = [...expensePieData].sort((a,b) => b.value - a.value)[0];
           insights.push(`การใช้จ่าย: หมวดหมู่ที่ใช้จ่ายมากที่สุดคือ "${topExp.name}" คิดเป็น ${((topExp.value / dashExpense) * 100).toFixed(1)}% ของรายจ่ายทั้งหมด`);
        }
        if (incomePieData.length > 0) {
           const topInc = [...incomePieData].sort((a,b) => b.value - a.value)[0];
           insights.push(`รายได้หลัก: มาจากหมวดหมู่ "${topInc.name}" คิดเป็น ${((topInc.value / dashIncome) * 100).toFixed(1)}% ของรายได้ทั้งหมด`);
        }
        return insights;
      };

      // ---------------------------------------------------------
      // Export Data Handlers
      // ---------------------------------------------------------
      const exportCSV = () => {
        const headers = ['วัน/เวลา', 'เลขที่เอกสาร', 'คำอธิบายรายการ', 'หมวดหมู่', 'ประเภท', 'จำนวนเงิน(บาท)'];

          tx.type === 'INCOME' ? 'รายรับ' : 'รายจ่าย', tx.amount
        ]);
        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `ledger_${getTodayString()}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const exportXLS = () => {
        const tableHtml = `
          <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="utf-8"></head>
            <body>

              <table border="1">
                <thead><tr><th>วัน/เวลา</th><th>เลขที่เอกสาร</th><th>คำอธิบายรายการ</th><th>หมวดหมู่</th><th>รายรับ (บาท)</th><th>รายจ่าย (บาท)</th></tr></thead>
                <tbody>
                  ${validTransactions.map(tx => `
                    <tr>
                      <td>${tx.date}</td><td>${tx.id}</td><td>${tx.title}</td><td>${tx.category}</td>
                      <td>${tx.type === 'INCOME' ? tx.amount : ''}</td><td>${tx.type === 'EXPENSE' ? tx.amount : ''}</td>
                    </tr>
                  `).join('')}
                  <tr><td colspan="4"><b>รวมยอดสะสมทั้งหมด</b></td><td><b>${totalIncome}</b></td><td><b>${totalExpense}</b></td></tr>
                </tbody>
              </table>
            </body>
          </html>
        `;
        const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `ledger_${getTodayString()}.xls`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      // ---------------------------------------------------------
      // Actions Handlers
      // ---------------------------------------------------------
      const advanceTotal = advanceForm.items.reduce((acc, item) => acc + ((parseInt(item.qty) || 0) * (parseFloat(item.price) || 0)), 0);

      const handleAddAdvanceItem = () => {
        setAdvanceForm({ ...advanceForm, items: [...advanceForm.items, { name: '', qty: 1, price: '' }] });
      };

      const handleRemoveAdvanceItem = (index) => {
        const newItems = [...advanceForm.items];
        newItems.splice(index, 1);
        setAdvanceForm({ ...advanceForm, items: newItems });
      };

      const handleAdvanceItemChange = (index, field, value) => {

        setAdvanceForm({ ...advanceForm, items: newItems });
      };

      const handleAdvanceSubmit = async (e) => {
        e.preventDefault();

        if (!user) return;
        
        const newTx = {
          id: generateRef('REQ'), 
          date: getFormatDate(), 
          type: 'EXPENSE', 
          category: advanceForm.category || expenseCategories[0] || 'เบิกจ่ายทั่วไป', 
          title: advanceForm.objective, 
          amount: advanceTotal, 
          refId: generateRef('ADV'), 
          detailsUrl: '', 
          status: 'PENDING', 
          requester: advanceForm.requester,
          subItems: advanceForm.items
        };

        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
        
        setAdvanceForm({ requester: '', objective: '', category: expenseCategories[0] || '', items: [{ name: '', qty: 1, price: '' }] });
        showToast('สร้างใบขอเบิกเงินเรียบร้อยแล้ว (รออนุมัติ)');
        setPrintTx(newTx); 
        setActiveTab('approvals');

      const handleDonationSubmit = async (e) => {

      const handleClearanceSubmit = async (e) => {

        showToast('ปฏิเสธรายการเรียบร้อย');

      const handleStockCountSubmit = async (e) => {
        e.preventDefault();
        if(!user) return;

        if (actualRemaining > item.stock) return alert(`ยอดคงเหลือที่ระบุ มากกว่าสต๊อกที่มีในระบบ`);

        const soldQty = item.stock - actualRemaining;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', item.id), { stock: actualRemaining }, { merge: true });

        if (soldQty > 0) {
          const newTx = {
            id: generateRef('TX'), date: getFormatDate(), type: 'INCOME', category: 'เช่าบูชา', 
            title: `รายรับจากการเช่าบูชา ${item.name} (จำหน่ายออก ${soldQty} ชิ้น)`, amount: item.price * soldQty, refId: item.id, status: 'APPROVED'
          };
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'transactions', newTx.id), newTx);
          showToast(`บันทึกการจำหน่าย ${soldQty} ชิ้น และอัปเดตสต๊อกเรียบร้อย`);
        } else {
          showToast(`อัปเดตยอดคงเหลือเรียบร้อย`);
        }
        setCountForm({ itemId: '', actualRemaining: '' });
      };

      const handleAddInventory = async (e) => {
        e.preventDefault();
        if (!newItemForm.name || !newItemForm.price || !user) return;
        const newItem = {
          id: generateRef('INV'), name: newItemForm.name, category: newItemForm.category, price: parseFloat(newItemForm.price),
          cost: parseFloat(newItemForm.cost || 0), stock: parseInt(newItemForm.stock || 0)
        };
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', newItem.id), newItem);
        setNewItemForm({ name: '', category: 'พระเครื่อง', price: '', stock: '', cost: '' });
        showToast('เพิ่มรายการวัตถุมงคลเข้าคลังเรียบร้อย');
      };

      const handleDeleteInventory = async (itemId, itemName) => {
        if (!user) return;
        if (!window.confirm(`ยืนยันการลบ "${itemName}" ออกจากคลังสินค้า? (การกระทำนี้ไม่สามารถย้อนกลับได้)`)) return;
        try {
          await deleteDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', itemId));
          showToast('ลบรายการสินค้าเรียบร้อย');
        } catch(err) { console.error(err); alert('เกิดข้อผิดพลาดในการลบรายการ'); }

      const handleSaveGeneralSettings = async (e) => {
        e.preventDefault();
        if (!user) return;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'general'), generalSettings, { merge: true });

        e.preventDefault();
        if (!user) return;
        const value = type === 'income' ? newIncomeCat.trim() : newExpenseCat.trim();
        if (!value) return;
        const currentList = type === 'income' ? incomeCategories : expenseCategories;
        if (currentList.includes(value)) return alert('หมวดหมู่นี้มีอยู่ในระบบแล้ว');
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'categories'), { [type]: [...currentList, value] }, { merge: true });
        if (type === 'income') setNewIncomeCat('');
        if (type === 'expense') setNewExpenseCat('');
      };

        if (!user || !window.confirm(`ยืนยันการลบหมวดหมู่ "${valueToDelete}" ?`)) return;
        const currentList = type === 'income' ? incomeCategories : expenseCategories;
        await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'settings', 'categories'), { [type]: currentList.filter(cat => cat !== valueToDelete) }, { merge: true });

          const adjustVal = parseInt(editForm.stockAdjustValue) || 0;

          if (editForm.stockAdjustType === 'add') newStock += adjustVal;
          else if (editForm.stockAdjustType === 'reduce') newStock = Math.max(0, newStock - adjustVal);

          const updatedItem = { ...editingItem, name: editForm.name, price: parseFloat(editForm.price), stock: newStock };
          await setDoc(doc(db, 'artifacts', erpAppId, 'public', 'data', 'inventory', editingItem.id), updatedItem);

          if (editForm.stockAdjustType !== 'none' && adjustVal > 0) {

              id: generateRef('TX'), date: getFormatDate(), type: 'INCOME', category: 'ปรับปรุงสต๊อก',
              title: `[${actionStr}] ${editForm.name} ปรับจำนวน ${adjustVal} ชิ้น ${editForm.reason ? `(เหตุผล: ${editForm.reason})` : ''}`,

          console.error("Save Edit Error:", err);

          const url = prompt('วางลิงก์รูปภาพหรือไฟล์เอกสาร (URL):');
          if(url && url.trim() !== '') {

          }
        };

            <div className="flex flex-col sm:flex-row gap-2 items-center">
              <button type="button" onClick={() => openQrSync(contextId)} className="w-full sm:flex-1 bg-blue-600 text-white hover:bg-blue-700 py-2 rounded-md transition flex items-center justify-center gap-2 font-medium shadow-sm text-sm">

                         <div className="bg-white p-10 text-center rounded-md border border-slate-200 shadow-sm">
                            <CheckCircle2 className="w-12 h-12 text-slate-300 mx-auto mb-3" />
                            <h3 className="text-base font-semibold text-slate-500">ไม่มีคำขอรออนุมัติ</h3>
                         </div>
                      ) : (
                        pendingTransactions.map(tx => {
                          const urls = parseUrls(tx.detailsUrl);
                          return (
                            <div key={tx.id} className="bg-white p-4 md:p-5 rounded-md shadow-sm border border-amber-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                              <div className="flex-1 space-y-2.5 w-full">
                                <div className="flex justify-between items-start">
                                  <div>
                                    <span className="text-[10px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md mb-1.5 inline-block">รออนุมัติให้ยืม/เบิก</span>
                                    <h3 className="text-base font-bold text-slate-800 leading-tight">{tx.title}</h3>
                                  </div>
                                  <h3 className="text-xl font-bold text-rose-600">{formatMoney(tx.amount)}</h3>
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50 p-3 rounded-md border border-slate-100 text-xs">
                                  <div><p className="text-slate-500 font-semibold mb-0.5">รหัสเอกสาร</p><p className="font-mono text-slate-700">{tx.refId || tx.id}</p></div>
                                  <div><p className="text-slate-500 font-semibold mb-0.5">วัน/เวลาที่ขอ</p><p className="text-slate-700">{tx.date}</p></div>
                                  <div><p className="text-slate-500 font-semibold mb-0.5">หมวดหมู่</p><p className="text-slate-700">{tx.category}</p></div>
                                  <div><p className="text-slate-500 font-semibold mb-0.5">ผู้ขอเบิก</p><p className="text-slate-700">{tx.requester || 'ไม่ระบุ'}</p></div>
                                </div>
                                
                                <div className="flex flex-col sm:flex-row gap-2 mt-2">
                                  <button 
                                    onClick={() => setViewingTx(tx)} 
                                    className="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-md font-medium flex items-center justify-center gap-1.5 hover:bg-blue-100 transition w-full md:w-auto text-xs border border-blue-200"
                                  >
                                    <Eye className="w-4 h-4"/> ดูรายละเอียด {urls.length > 0 && `(${urls.length} รูป)`}
                                  </button>
                                  <button 
                                    onClick={() => setPrintTx(tx)} 
                                    className="text-slate-700 bg-white px-3 py-1.5 rounded-md font-medium flex items-center justify-center gap-1.5 hover:bg-slate-50 transition w-full md:w-auto text-xs border border-slate-300 shadow-sm"
                                  >
                                    <Printer className="w-4 h-4"/> สร้างเอกสารขอเบิก
                                  </button>
                                </div>
                              </div>
                              
                              <div className="flex flex-col gap-2 w-full md:w-40 shrink-0">
                                <button onClick={() => handleApproveRequest(tx.id)} className="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-3 rounded-md flex items-center justify-center gap-2 transition shadow-sm text-sm"><Check className="w-4 h-4"/> อนุมัติเบิก</button>

                              </div>
                            </div>
                          )
                        })
                      )}
                    </div>
                  </div>
                )}

                {/* >>>>>>>>>> DAILY REPORT VIEW (รายงานประจำวัน) <<<<<<<<<< */}
                {activeTab === 'dailyReport' && (() => {
                  const pastTransactions = validTransactions.filter(tx => tx.date.split(' ')[0] < reportDate);
                  const broughtForwardIncome = pastTransactions.filter(t => t.type === 'INCOME').reduce((acc, curr) => acc + curr.amount, 0);
                  const broughtForwardExpense = pastTransactions.filter(t => t.type === 'EXPENSE').reduce((acc, curr) => acc + curr.amount, 0);
                  const broughtForwardBalance = broughtForwardIncome - broughtForwardExpense;

                  const dailyTransactions = validTransactions.filter(tx => tx.date.startsWith(reportDate));
                  const sortedDailyTxs = [...dailyTransactions].sort((a, b) => a.date.localeCompare(b.date));
                  const dailyIncome = dailyTransactions.filter(t => t.type === 'INCOME').reduce((acc, curr) => acc + curr.amount, 0);
                  const dailyExpense = dailyTransactions.filter(t => t.type === 'EXPENSE').reduce((acc, curr) => acc + curr.amount, 0);
                  
                  const carriedForwardBalance = broughtForwardBalance + dailyIncome - dailyExpense;

                  const incomeByCat = {};
                  const expenseByCat = {};
                  dailyTransactions.forEach(t => {
                    if (t.type === 'INCOME') incomeByCat[t.category] = (incomeByCat[t.category] || 0) + t.amount;
                    if (t.type === 'EXPENSE') expenseByCat[t.category] = (expenseByCat[t.category] || 0) + t.amount;
                  });

                  return (
                  <div className="space-y-4 animate-in fade-in print:p-0 print:m-0">
                    
                    {/* แถบเครื่องมือด้านบน จะถูกซ่อนเวลาสั่งพิมพ์ */}
                    <div className="bg-white p-4 md:p-5 rounded-md shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 print:hidden">
                      <div className="flex items-center gap-3">
                        <div className="bg-blue-100 p-2.5 rounded-md"><CalendarDays className="w-5 h-5 text-blue-600" /></div>
                        <div>
                          <h2 className="text-xl font-bold text-slate-800">พิมพ์รายงานประจำวัน</h2>
                          <p className="text-slate-500 text-xs">ระบบสรุปยอดยกมา รายรับ-รายจ่าย และยอดยกไปให้อัตโนมัติ</p>
                        </div>
                      </div>
                      
                      <div className="flex items-center gap-3 w-full md:w-auto">
                         <div className="flex flex-col">
                           <label className="text-[10px] font-bold text-slate-500 mb-0.5">เลือกวันที่</label>
                           <input 
                              type="date" 
                              value={reportDate} 
                              onChange={(e) => setReportDate(e.target.value)} 
                              className="px-3 py-1.5 border border-slate-300 rounded-md outline-none focus:border-blue-500 font-medium text-sm bg-white shadow-sm"
                           />
                         </div>
                         <button onClick={() => window.print()} className="bg-slate-800 text-white px-4 py-2 rounded-md hover:bg-slate-700 transition flex items-center justify-center gap-1.5 font-medium shadow-sm self-end text-sm">
                           <Printer className="w-4 h-4"/> สั่งพิมพ์เอกสาร
                         </button>
                      </div>
                    </div>

                    {/* Report Printable Area (กระดาษที่จะถูกพิมพ์) */}

                       {/* ส่วนหัวเอกสาร */}
                       <div className="text-center mb-6 pb-4 border-b-2 border-slate-800 print:border-black">
                         <h1 className="text-xl font-bold mb-1 text-slate-900">{generalSettings.templeName}</h1>
                         <h2 className="text-lg font-bold mb-1">รายงานสรุปรับ - จ่ายเงิน ประจำวัน</h2>
                         <p className="text-sm text-slate-700 print:text-black">ประจำวันที่: {new Date(reportDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                       </div>

                       {/* สรุปยอดรวม (4 กล่อง) */}
                       <div className="grid grid-cols-4 gap-2 mb-6 text-center print:break-inside-avoid">
                         <div className="bg-slate-50 print:bg-transparent border border-slate-200 print:border-black p-2 rounded-md print:rounded-none flex flex-col justify-center">
                           <p className="font-bold text-slate-600 print:text-black text-[10px] uppercase tracking-wide mb-1">ยอดยกมา</p>
                           <p className="text-sm font-bold text-slate-800 print:text-black">{formatMoney(broughtForwardBalance)}</p>
                         </div>
                         <div className="bg-emerald-50 print:bg-transparent border border-emerald-200 print:border-black p-2 rounded-md print:rounded-none flex flex-col justify-center">
                           <p className="font-bold text-emerald-800 print:text-black text-[10px] uppercase tracking-wide mb-1">รวมรับวันนี้</p>
                           <p className="text-sm font-bold text-emerald-600 print:text-black">+{formatMoney(dailyIncome)}</p>
                         </div>
                         <div className="bg-rose-50 print:bg-transparent border border-rose-200 print:border-black p-2 rounded-md print:rounded-none flex flex-col justify-center">
                           <p className="font-bold text-rose-800 print:text-black text-[10px] uppercase tracking-wide mb-1">รวมจ่ายวันนี้</p>
                           <p className="text-sm font-bold text-rose-600 print:text-black">-{formatMoney(dailyExpense)}</p>
                         </div>
                         <div className="bg-blue-50 print:bg-transparent border border-blue-200 print:border-black p-2 rounded-md print:rounded-none flex flex-col justify-center">
                           <p className="font-bold text-blue-800 print:text-black text-[10px] uppercase tracking-wide mb-1">ยอดยกไป (คงเหลือ)</p>
                           <p className="text-base font-bold text-blue-700 print:text-black">{formatMoney(carriedForwardBalance)}</p>
                         </div>
                       </div>

                       {/* ตารางสรุปหมวดหมู่ (แสดงเฉพาะถ้ามีรายการ) */}

                         <div className="flex gap-4 mb-6 print:break-inside-avoid">
                           {Object.keys(incomeByCat).length > 0 && (
                             <div className="flex-1 border border-slate-800 print:border-black rounded-sm overflow-hidden">
                               <div className="bg-emerald-50 print:bg-transparent border-b border-slate-800 print:border-black px-3 py-1.5 font-bold text-[11px] text-center">สรุปรายรับตามหมวดหมู่</div>
                               <table className="w-full text-[11px]">
                                 <tbody>
                                   {Object.entries(incomeByCat).map(([cat, amt]) => (
                                     <tr key={cat} className="border-b border-slate-200 print:border-black last:border-0">
                                       <td className="px-3 py-1">{cat}</td>
                                       <td className="px-3 py-1 text-right font-medium text-emerald-700 print:text-black">{formatMoney(amt)}</td>
                                     </tr>
                                   ))}
                                 </tbody>
                               </table>
                             </div>
                           )}
                           {Object.keys(expenseByCat).length > 0 && (

                               <table className="w-full text-[11px]">
                                 <tbody>
                                   {Object.entries(expenseByCat).map(([cat, amt]) => (
                                     <tr key={cat} className="border-b border-slate-200 print:border-black last:border-0">
                                       <td className="px-3 py-1">{cat}</td>
                                       <td className="px-3 py-1 text-right font-medium text-rose-700 print:text-black">{formatMoney(amt)}</td>
                                     </tr>
                                   ))}
                                 </tbody>
                               </table>
                             </div>
                           )}
                         </div>
                       )}

                       {/* ตารางรายละเอียด (Ledger) */}
                       <div className="w-full mb-8">
                         <h3 className="font-bold text-[13px] mb-2">รายละเอียดรายการรับ-จ่าย</h3>
                         <table className="w-full text-left text-xs border-collapse border border-slate-800 print:border-black">
                           <thead>
                             <tr className="bg-slate-100 print:bg-transparent border-b border-slate-800 print:border-black">
                               <th className="py-2 px-3 font-bold border-r border-slate-800 print:border-black w-16 text-center">เวลา</th>
                               <th className="py-2 px-3 font-bold border-r border-slate-800 print:border-black">รายการ</th>
                               <th className="py-2 px-3 font-bold border-r border-slate-800 print:border-black w-28 text-center">หมวดหมู่</th>
                               <th className="py-2 px-3 font-bold border-r border-slate-800 print:border-black text-right w-24">รายรับ</th>
                               <th className="py-2 px-3 font-bold text-right w-24">รายจ่าย</th>
                             </tr>
                           </thead>
                           <tbody>
                             {/* Row: ยอดยกมา */}
                             <tr className="border-b border-slate-800 print:border-black bg-slate-50 print:bg-transparent">
                               <td colSpan="3" className="py-2 px-3 border-r border-slate-800 print:border-black text-right font-semibold text-slate-700 print:text-black">ยอดยกมาจากวันก่อนหน้า</td>
                               <td className="py-2 px-3 text-right font-bold text-blue-700 print:text-black border-r border-slate-800 print:border-black">{broughtForwardBalance >= 0 ? formatMoney(broughtForwardBalance).replace('฿', '').trim() : '-'}</td>
                               <td className="py-2 px-3 text-right font-bold text-blue-700 print:text-black">{broughtForwardBalance < 0 ? formatMoney(Math.abs(broughtForwardBalance)).replace('฿', '').trim() : '-'}</td>
                             </tr>

                             {/* Rows: Transactions */}
                             {sortedDailyTxs.length === 0 ? (
                               <tr><td colSpan="5" className="py-8 text-center text-slate-500 print:text-black border-b border-slate-800 print:border-black text-[11px]">ไม่มีรายการความเคลื่อนไหวในวันนี้</td></tr>
                             ) : (
                               sortedDailyTxs.map(tx => (
                                 <tr key={tx.id} className="border-b border-slate-300 print:border-black">
                                   <td className="py-1.5 px-3 border-r border-slate-300 print:border-black text-center text-[11px]">{tx.date.split(' ')[1]}</td>
                                   <td className="py-1.5 px-3 border-r border-slate-300 print:border-black text-[11px]">{tx.title}</td>
                                   <td className="py-1.5 px-3 border-r border-slate-300 print:border-black text-center text-[10px]">{tx.category}</td>
                                   <td className="py-1.5 px-3 text-right border-r border-slate-300 print:border-black font-medium text-[11px]">{tx.type === 'INCOME' ? formatMoney(tx.amount).replace('฿', '').trim() : '-'}</td>
                                   <td className="py-1.5 px-3 text-right font-medium text-[11px]">{tx.type === 'EXPENSE' ? formatMoney(tx.amount).replace('฿', '').trim() : '-'}</td>
                                 </tr>
                               ))
                             )}

                             {/* Summary Rows */}
                             <tr className="border-t-2 border-slate-800 print:border-black font-bold">
                               <td colSpan="3" className="py-2 px-3 text-right border-r border-slate-800 print:border-black text-[11px]">รวมรับ-จ่าย ประจำวัน</td>
                               <td className="py-2 px-3 text-right border-r border-slate-800 print:border-black text-[11px] text-emerald-700 print:text-black">{formatMoney(dailyIncome).replace('฿', '').trim()}</td>
                               <td className="py-2 px-3 text-right text-[11px] text-rose-700 print:text-black">{formatMoney(dailyExpense).replace('฿', '').trim()}</td>
                             </tr>
                             <tr className="bg-slate-100 print:bg-transparent font-bold border-b-2 border-slate-800 print:border-black">
                               <td colSpan="3" className="py-2.5 px-3 text-right border-r border-slate-800 print:border-black text-sm">ยอดยกไป (คงเหลือสุทธิ)</td>
                               <td colSpan="2" className="py-2.5 px-3 text-center underline decoration-double text-base text-blue-700 print:text-black">{formatMoney(carriedForwardBalance)}</td>
                             </tr>
                           </tbody>
                         </table>
                       </div>

                       {/* ลายเซ็น 3 ช่อง */}
                       <div className="mt-20 flex justify-between text-xs print:break-inside-avoid">
                         <div className="text-center w-1/3 px-2">
                           <div className="flex items-end justify-center mb-2">
                             <span className="inline-block w-full border-b border-slate-800 print:border-black border-dotted"></span>
                           </div>
                           <p className="mt-1 font-semibold text-slate-700 print:text-black">ผู้จัดทำ</p>
                         </div>
                         <div className="text-center w-1/3 px-2">
                           <div className="flex items-end justify-center mb-2">
                             <span className="inline-block w-full border-b border-slate-800 print:border-black border-dotted"></span>
                           </div>
                           <p className="mt-1 font-semibold text-slate-700 print:text-black">ผู้ตรวจสอบ</p>
                         </div>
                         <div className="text-center w-1/3 px-2">
                           <div className="flex items-end justify-center mb-2">
                             <span className="inline-block w-full border-b border-slate-800 print:border-black border-dotted"></span>
                           </div>
                           <p className="mt-1 font-semibold text-slate-700 print:text-black">ผู้อนุมัติ (เจ้าอาวาส / ประธาน)</p>
                         </div>
                       </div>
                    </div>
                  </div>
                  );
                })()}

                {/* >>>>>>>>>> ADVANCE REQUEST VIEW (สร้างใบขอเบิกแบบมีรายการย่อย) <<<<<<<<<< */}
                {activeTab === 'expense' && authRole === 'admin' && (
                  <div className="space-y-4 animate-in fade-in">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="bg-amber-100 p-2.5 rounded-md"><FileText className="w-5 h-5 text-amber-600" /></div>
                      <div>
                        <h2 className="text-xl font-bold text-slate-800">สร้างคำขอเบิกเงิน (Request Advance)</h2>
                        <p className="text-slate-500 text-xs">ระบุรายการที่ต้องการขอเบิกแบบละเอียดหลายรายการ และระบุราคาประมาณการต่อหน่วย</p>
                      </div>
                    </div>
                    <div className="bg-white p-5 md:p-6 rounded-md shadow-sm border border-slate-200">
                      <form onSubmit={handleAdvanceSubmit} className="space-y-5">
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs font-semibold text-slate-700 mb-1.5">ผู้ขอเบิก (ผู้รับเงิน)</label>
                            <input required type="text" value={advanceForm.requester} onChange={e=>setAdvanceForm({...advanceForm, requester: e.target.value})} className="w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none text-sm transition" placeholder="ชื่อผู้เบิก / หน่วยงาน"/>
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-700 mb-1.5">หมวดหมู่ค่าใช้จ่าย</label>
                            <select value={advanceForm.category} onChange={e=>setAdvanceForm({...advanceForm, category: e.target.value})} className="w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none text-sm transition">
                              {expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
                            </select>
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs font-semibold text-slate-700 mb-1.5">วัตถุประสงค์การขอเบิก (Objective)</label>
                          <input required type="text" value={advanceForm.objective} onChange={e=>setAdvanceForm({...advanceForm, objective: e.target.value})} className="w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none text-sm transition" placeholder="เช่น ขออนุมัติซื้ออุปกรณ์ทำความสะอาดประจำเดือน"/>
                        </div>

                        <div className="border border-slate-200 rounded-md overflow-hidden bg-white shadow-sm">
                          <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200 font-bold text-slate-700 flex justify-between items-center text-sm">
                            <span>รายการที่ต้องการขอเบิก</span>
                            <button type="button" onClick={handleAddAdvanceItem} className="text-xs bg-white border border-slate-300 text-slate-700 px-2.5 py-1.5 rounded shadow-sm flex items-center gap-1 hover:bg-slate-50 font-semibold transition"><Plus className="w-3.5 h-3.5"/> เพิ่มรายการ</button>
                          </div>
                          <div className="p-3 space-y-2">
                            {advanceForm.items.map((item, idx) => (
                                <div key={idx} className="flex flex-col sm:flex-row gap-2 items-start sm:items-center">
                                  <div className="w-full sm:w-1/2">
                                      <input required type="text" placeholder="รายละเอียดรายการ" value={item.name} onChange={e=>handleAdvanceItemChange(idx, 'name', e.target.value)} className="w-full px-3 py-1.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none transition"/>
                                  </div>
                                  <div className="w-full sm:w-1/6">
                                      <input required type="number" min="1" placeholder="จำนวน" value={item.qty} onChange={e=>handleAdvanceItemChange(idx, 'qty', e.target.value)} className="w-full px-3 py-1.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none transition"/>
                                  </div>
                                  <div className="w-full sm:w-1/4">
                                      <input required type="number" min="0" placeholder="ราคา/หน่วย" value={item.price} onChange={e=>handleAdvanceItemChange(idx, 'price', e.target.value)} className="w-full px-3 py-1.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none transition"/>
                                  </div>
                                  <div className="w-full sm:w-auto">
                                      <button type="button" onClick={()=>handleRemoveAdvanceItem(idx)} disabled={advanceForm.items.length === 1} className="p-1.5 text-rose-500 hover:bg-rose-50 border border-transparent rounded disabled:opacity-30 transition"><Trash2 className="w-4 h-4"/></button>
                                  </div>
                                </div>
                            ))}
                          </div>
                          <div className="bg-slate-50 px-4 py-3 border-t border-slate-200 flex justify-between items-center">
                            <span className="font-semibold text-slate-600 text-xs">รวมประมาณการทั้งสิ้น:</span>
                            <span className="text-lg font-bold text-rose-600">{formatMoney(advanceTotal)}</span>

                    <input 
                      type="password" 
                      placeholder="รหัสผ่าน..." 
                      value={loginPassword}
                      onChange={(e) => {setLoginPassword(e.target.value); setLoginError('');}}
                      className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none text-sm transition text-center"
                      onKeyDown={(e) => { if(e.key === 'Enter') handleLoginSubmit(); }}
                    />
                    {loginError && <p className="text-[11px] text-rose-500 mt-1.5 font-bold text-center">{loginError}</p>}
                  </div>
                  <button 
                    onClick={handleLoginSubmit}
                    className="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700 transition text-sm shadow-sm flex items-center justify-center gap-2"
                  >
                    <Lock className="w-4 h-4"/> ยืนยันการเข้าสู่ระบบ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: QR Scan Camera Component ----- */}
          {qrModalVisible && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-lg w-full max-w-sm text-center p-6 relative shadow-xl">
                <button onClick={() => {setQrModalVisible(false); setActiveTransferId(null);}} className="absolute top-4 right-4 bg-white border border-slate-200 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 rounded p-1.5 transition">
                  <X className="w-4 h-4"/>
                </button>
                <div className="mx-auto bg-blue-50 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mb-4">
                  <Camera className="w-8 h-8"/>
                </div>
                <h3 className="font-bold text-xl mb-1">สแกนถ่ายรูปจากมือถือ</h3>
                <p className="text-xs text-slate-500 mb-6">เปิดกล้องมือถือสแกน QR Code นี้</p>
                <div className="flex justify-center mb-6 bg-white p-3 rounded-md border-2 border-dashed border-blue-200 inline-block mx-auto">
                  {activeTransferId && <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?transfer=' + activeTransferId)}&margin=0`} alt="QR Code" className="w-40 h-40 rounded" />}
                </div>
                <div className="flex flex-col items-center gap-2 text-blue-600 bg-blue-50 py-3 rounded-md border border-blue-100">
                  <Loader2 className="w-5 h-5 animate-spin" />
                  <p className="text-xs font-bold animate-pulse">กำลังรอรับรูปภาพจากโทรศัพท์...</p>
                </div>
              </div>
            </div>
          )}

          {/* ----- Modal: Full Image Preview Popup ----- */}
          {previewImage && (
            <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-sm flex items-center justify-center p-4 print:hidden" onClick={() => setPreviewImage(null)}>
              <button onClick={() => setPreviewImage(null)} className="absolute top-6 right-6 text-white hover:text-rose-400 bg-white/10 hover:bg-white/20 rounded p-2 transition border border-white/20">
                <X className="w-6 h-6"/>
              </button>
              {isImageUrl(previewImage) ? (
                <img src={previewImage} alt="Evidence" className="max-w-full max-h-[90vh] object-contain rounded shadow-2xl" onClick={e => e.stopPropagation()} />
              ) : (
                <div className="bg-white p-8 rounded-lg flex flex-col items-center shadow-xl" onClick={e => e.stopPropagation()}>
                  <ExternalLink className="w-12 h-12 text-blue-500 mb-3"/>
                  <h3 className="text-lg font-bold text-slate-800 mb-1">นี่คือไฟล์แนบภายนอก</h3>
                  <p className="text-slate-500 mb-5 text-sm">กรุณากดเปิดเพื่อดูไฟล์ในหน้าต่างใหม่</p>
                  <a href={previewImage} target="_blank" rel="noreferrer" className="bg-blue-600 text-white px-5 py-2.5 rounded-md font-medium hover:bg-blue-700 text-sm shadow-sm">เปิดดูไฟล์แนบ</a>
                </div>
              )}
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
